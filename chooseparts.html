<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tonee | パーツ選択</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    h2.page-title {
      font-weight: 400;
      font-size: 16px;
      color: #000;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .page-subtitle {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-bottom: 20px;
    }
    .parts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 300px;
      margin: 0 auto 16px;
    }
    .part-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 8px;
      border: 1.5px solid #ddd;
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      color: #333;
      font-family: 'Noto Serif JP', serif;
    }
    .part-option .icon { font-size: 24px; }
    .part-option.selected {
      border-color: #F9C1CF;
      background: #FFF0F4;
      color: #C9668A;
    }
    .preview-area {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 12px;
      border-radius: 16px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .preview-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #F9C1CF;
      border-top-color: #C9668A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 14px;
      color: #C9668A;
      font-family: 'Noto Serif JP', serif;
    }
    .loading-steps {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      max-width: 240px;
      line-height: 1.8;
    }
    .error-msg {
      display: none;
      background: #FFF0F4;
      border: 1px solid #F9C1CF;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #C9668A;
      text-align: center;
      margin: 8px 0;
      max-width: 300px;
      width: 100%;
    }
    .error-msg.active { display: block; }
  </style>
</head>
<body>
  <main class="hero">
    <div class="top-content">
      <h1 class="logo">Tonee</h1>
      <p class="catch">"憧れ"から、"私らしさ"へ。</p>
    </div>
    <section class="center-area">
      <h2 class="page-title">分析するパーツを選んでね</h2>
      <p class="page-subtitle">複数選択OK</p>
      <div class="preview-area">
        <img id="previewImg" alt="アップロード画像" style="display:none">
        <div id="previewPlaceholder" class="preview-placeholder">画像なし</div>
      </div>
      <div class="parts-grid">
        <button class="part-option" data-part="lip">
          <span class="icon">💋</span>
          <span>リップ</span>
        </button>
        <button class="part-option" data-part="cheek">
          <span class="icon">🌸</span>
          <span>チーク</span>
        </button>
        <button class="part-option" data-part="eye">
          <span class="icon">✨</span>
          <span>アイシャドウ</span>
        </button>
      </div>
      <div id="errorMsg" class="error-msg"></div>
    </section>
    <div class="button-row">
      <a class="back-button" href="./upload.html">← Back</a>
      <button id="analyzeBtn" class="next-button" style="border:none;cursor:pointer;opacity:0.5;pointer-events:none;">
        分析する →
      </button>
    </div>
  </main>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">AIが分析中...</div>
    <div class="loading-steps" id="loadingStep">画像を読み込んでいます</div>
  </div>
  <script>
    const API_BASE = 'https://tonee-backend.vercel.app';
    const partButtons = document.querySelectorAll('.part-option');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const previewImg = document.getElementById('previewImg');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const errorMsg = document.getElementById('errorMsg');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingStep = document.getElementById('loadingStep');
    let selectedParts = new Set();
    const uploadedImage = localStorage.getItem('tonee_uploaded_image');
    if (uploadedImage) {
      previewImg.src = uploadedImage;
      previewImg.style.display = 'block';
      previewPlaceholder.style.display = 'none';
    }
    partButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const part = btn.dataset.part;
        if (selectedParts.has(part)) {
          selectedParts.delete(part);
          btn.classList.remove('selected');
        } else {
          selectedParts.add(part);
          btn.classList.add('selected');
        }
        updateAnalyzeBtn();
      });
    });
    function updateAnalyzeBtn() {
      const enabled = selectedParts.size > 0 && uploadedImage;
      analyzeBtn.style.opacity = enabled ? 1 : 0.5;
      analyzeBtn.style.pointerEvents = enabled ? 'auto' : 'none';
    }
    analyzeBtn.addEventListener('click', async () => {
      if (!uploadedImage || selectedParts.size === 0) return;
      const skinType = localStorage.getItem('tonee_skin_type') || 'combo';
      const personalColor = localStorage.getItem('tonee_personal_color') || 'spring';
      errorMsg.classList.remove('active');
      loadingOverlay.classList.add('active');
      const steps = [
        '画像を読み込んでいます...',
        'AIがパーツを認識中...',
        'カラーを抽出しています...',
        'パーソナルカラーを分析中...',
        'あなたに似合うコスメを探しています...'
      ];
      let stepIdx = 0;
      const stepInterval = setInterval(() => {
        stepIdx = (stepIdx + 1) % steps.length;
        loadingStep.textContent = steps[stepIdx];
      }, 1500);
      try {
        const response = await fetch(`${API_BASE}/api/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image: uploadedImage,
            parts: Array.from(selectedParts),
            skinType,
            personalColor
          })
        });
        clearInterval(stepInterval);
        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        const data = await response.json();
        localStorage.setItem('tonee_analysis_result', JSON.stringify(data));
        localStorage.setItem('tonee_selected_parts', JSON.stringify(Array.from(selectedParts)));
        loadingOverlay.classList.remove('active');
        window.location.href = './recommend.html';
      } catch (err) {
        clearInterval(stepInterval);
        loadingOverlay.classList.remove('active');
        console.error('Analysis failed:', err);
        errorMsg.textContent = '分析中にエラーが発生しました。しばらくしてからもう一度お試しください。';
        errorMsg.classList.add('active');
      }
    });
  </script>
</body>
</html>
