<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tonee | パーツを選ぶ</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* 画像プレビュー（中央・枠内に収める） */
    .preview-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .preview-frame {
      width: 260px; height: 260px;
      border-radius: 16px; background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .preview-frame img {
      width: 100%; height: 100%; object-fit: cover; /* 見映え優先。全体表示はcontainに変更可 */
      display: block;
    }

    /* タイトルとラジオ（縦） */
    h2.page-title {
      font-weight: 400; font-size: 16px; color: #000;
      margin: 6px 0 12px; text-align: center; letter-spacing: .5px;
    }
    .radio-group {
      display: flex; flex-direction: column; gap: 12px;
      width: 220px; margin: 0 auto;
    }
    .radio-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid #D0D0D0; border-radius: 12px;
      background: #fff; cursor: pointer; transition: background-color .2s ease, border-color .2s ease;
    }
    .radio-item:hover { background: #fafafa; }
    .radio-item input { appearance: none; -webkit-appearance: none; }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1px solid #999; background: #fff; position: relative; flex: 0 0 18px;
    }
    .radio-item.active { border-color: #F9C1CF; background: #FFF5F7; }
    .radio-item.active .radio-dot {
      border-color: #F9C1CF;
    }
    .radio-item.active .radio-dot::after {
      content: ""; position: absolute; inset: 4px;
      border-radius: 50%; background: #F9C1CF;
    }
    .radio-label { font-size: 15px; font-family: 'Noto Serif JP', serif; }

    /* 小さめ端末で微調整 */
    @media (max-width: 360px){
      .preview-frame { width: 240px; height: 240px; }
      .radio-group { width: 200px; }
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="top-content">
      <h1 class="logo">Tonee</h1>
      <p class="catch">“憧れ”から、“私らしさ”へ。</p>
    </div>

    <section class="center-area">
      <div class="preview-wrap">
        <!-- アップロード画像のプレビュー -->
        <div class="preview-frame">
          <img id="chosenImage" alt="選択画像プレビュー">
        </div>

        <h2 class="page-title">分析したいパーツを選択</h2>

        <!-- 縦並びラジオ -->
        <div id="partRadios" class="radio-group" role="radiogroup" aria-label="分析パーツ">
          <label class="radio-item">
            <span class="radio-dot"></span>
            <input type="radio" name="part" value="lip" hidden>
            <span class="radio-label">リップ</span>
          </label>
          <label class="radio-item">
            <span class="radio-dot"></span>
            <input type="radio" name="part" value="cheek" hidden>
            <span class="radio-label">チーク</span>
          </label>
          <label class="radio-item">
            <span class="radio-dot"></span>
            <input type="radio" name="part" value="eyeshadow" hidden>
            <span class="radio-label">アイシャドウ</span>
          </label>
        </div>
      </div>
    </section>

    <div class="button-row">
      <a class="back-button" href="./upload.html">← Back</a>
      <a id="nextBtn" class="next-button" href="./recommend.html" aria-disabled="true" style="opacity:.5;pointer-events:none">Next →</a>
    </div>
  </main>

  <script>
  const imgEl   = document.getElementById('chosenImage');
  const nextBtn = document.getElementById('nextBtn');
  const group   = document.getElementById('partRadios');

  function setPartNextEnabled(enabled){
    nextBtn.style.opacity = enabled ? 1 : 0.5;
    nextBtn.style.pointerEvents = enabled ? 'auto' : 'none';
    nextBtn.setAttribute('aria-disabled', String(!enabled));
  }

  // 画像を upload から復元
  (function showUploaded(){
    const saved = localStorage.getItem('tonee_uploaded_image');
    if (saved && imgEl) {
      imgEl.src = saved;
    } else {
      alert('画像がまだ選ばれていません。アップロード画面に戻ります。');
      location.href = './upload.html';
    }
  })();

  // ラジオ選択を初期状態に戻す（全て未選択 & Next無効）
  function resetPartSelection(){
    [...group.querySelectorAll('.radio-item')].forEach(el => el.classList.remove('active'));
    [...group.querySelectorAll('input[type="radio"]')].forEach(input => { input.checked = false; });
    setPartNextEnabled(false);
  }

  // ページ表示時は毎回リセット
  document.addEventListener('DOMContentLoaded', resetPartSelection);
  window.addEventListener('pageshow', (e) => { 
    if (e.persisted) resetPartSelection(); 
  });

  // クリックで選択
  group.addEventListener('click', (e) => {
    const item = e.target.closest('.radio-item');
    if (!item) return;

    // active切り替え
    [...group.querySelectorAll('.radio-item')].forEach(el => el.classList.remove('active'));
    item.classList.add('active');

    // 実ラジオ
    const input = item.querySelector('input[type="radio"]');
    input.checked = true;

    // 保存 & Next有効化
    localStorage.setItem('tonee_selected_part', input.value);
    setPartNextEnabled(true);
  });
</script>
</body>
</html>
